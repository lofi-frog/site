<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jules benjamin</title>
    <link rel="stylesheet" href="style.css">
</head>
<script>
    fetch('content.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('about').innerHTML = html;
        });
</script>
<body>
    <div id="clouds"></div>
    <div id="about"></div>
    <details id="cloud-controls">
        <summary>🌥️ cloud controls 🌥️</summary>
        <div>
            <label>Speed: <input type="range" id="speedInput" min="0" max="1" step="0.05" value="0.2"></label>
            <label>Direction: <input type="number" id="directionInput" min="0" max="360" value="60">°</label>
            <button id="addCloudButton">+ Random Cloud</button>
        </div>
    </details>

    <script src="createSky.js"></script>
    <script src="userInteractiveSky.js"></script>
</body>
</html>
